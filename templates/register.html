{% extends 'base.html' %}{% block content %}<h1>Регистрация пользователя</h1><p class="muted">Сценарий создания пользователя: посетитель заполняет форму, выбирает роль студента или работодателя, после чего учетная запись сохраняется в базе данных.</p><form method="post" class="form card"><input name="full_name" placeholder="ФИО" required><input name="email" type="email" placeholder="Email" required><input name="username" placeholder="Логин" required><input name="password" type="password" placeholder="Пароль не менее 6 символов" required><select name="role"><option value="student">Студент-соискатель</option><option value="employer">Работодатель</option></select><button class="btn">Создать учетную запись</button></form>{% endblock %}
