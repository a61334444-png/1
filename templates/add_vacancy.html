{% extends 'base.html' %}{% block content %}<h1>Добавление вакансии</h1><form method="post" class="form card"><input name="title" placeholder="Название вакансии" required><select name="employer_id">{% for e in employers %}<option value="{{e.id}}">{{e.name}}</option>{% endfor %}</select><input name="category" placeholder="Категория" required><input name="salary" placeholder="Зарплата" required><input name="city" placeholder="Город" required><input name="employment_type" placeholder="Тип занятости" required><textarea name="description" placeholder="Описание" required></textarea><textarea name="requirements" placeholder="Требования" required></textarea><button class="btn">Сохранить вакансию</button></form>{% endblock %}
